<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gourmet Go - Recipe Finder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <!----------Hero----------->
    <section>
      <div class="px-4 py-5 my-5 text-center hero-img">
        <h1 class="display-5 fw-bold text-body-emphasis">Gourmet Go</h1>
        <div class="col-lg-6 mx-auto">
          <p class="lead mb-4">What's today's meal?</p>
          <input
            id="search-input"
            class="form-control form-control-lg mb-3"
            type="text"
            placeholder="Search by ingredient..."
            aria-label="main search"
          />
        </div>
      </div>
    </section>
    <!---------------Tarjetas---------------->
    

    <div class="container text-center">
      <div id="recipes" class="row row-cols-lg-4 g-4 align-items-center">
        <!-- Las tarjetas de recetas se insertarán aquí dinámicamente -->
      <div id="recipes" class="row row-cols-1 row-cols-md-3 g-4"></div>

<div id="recipes" class="row row-cols-1 row-cols-md-3 g-4"></div>

<div id="meal-detail" class="d-none mt-4 border rounded bg-white p-4 shadow">
   <button class="btn btn-outline-secondary mb-4" onclick="showList()">
     ← Back to search
   </button>
    <div id="meal-content">
        </div>
</div>
      </div>
    </div>
    <!-----------------Footer---------------->
    <footer class="py-3 my-4 g-3">
      <div class="nav border-top justify-content-center pb-3 mb-1 pt-3 px-3">
        <p class="text-center text-body-secondary px-3 py-1">© 2026 Gourmet Go</p>
        <a href="https://github.com/gourmet-go" target="_blank" rel="noopener noreferrer">
          
          <button type="button" class="btn btn-light">Repository</button>
        </a>
        <a href="https://trillolillo.dev" target="_blank" rel="noopener noreferrer">
          <button type="button" class="btn btn-light">Dev Portfolio</button>
        </a>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/javascript/app.js"></script>
  </body>
</html>
