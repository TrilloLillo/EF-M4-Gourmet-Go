<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gourmet Go - Buscador de Recetas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <!----------Navbar----------->
    <header>
      <header class="p-3 mb-3 border-bottom">
        <div class="container">
          <div
            class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"
          >
            <a
              href="/"
              class="d-flex align-items-center mb-2 mb-lg-0 link-body-emphasis text-decoration-none"
            >
              <svg
                class="bi me-2"
                width="40"
                height="32"
                role="img"
                aria-label="Bootstrap"
              >
                <use xlink:href="#bootstrap"></use>
              </svg>
            </a>
            <ul
              class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"
            >
              <li>
                <a href="#" class="nav-link px-2 link-body-emphasis"
                  >Nuevas Recetas</a
                >
              </li>
              <li>
                <a href="#" class="nav-link px-2 link-body-emphasis"
                  >Para la Dieta</a
                >
              </li>
              <li>
                <a href="#" class="nav-link px-2 link-body-emphasis">Postres</a>
              </li>
              <li>
                <a href="#" class="nav-link px-2 link-body-emphasis"
                  >Recetas Exprés</a
                >
              </li>
            </ul>
          </div>
        </div>
      </header>
    </header>
    <!----------Hero----------->
    <section>
      <div class="px-4 py-5 my-5 text-center hero-img">
        <h1 class="display-5 fw-bold text-body-emphasis">Gourmet Go</h1>
        <div class="col-lg-6 mx-auto">
          <p class="lead mb-4">¿Qué cocinarás?</p>
          <input
            id="search-input"
            class="form-control form-control-lg mb-3"
            type="text"
            placeholder="Busca por ingrediente..."
            aria-label="buscador principal"
          />
          <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <button type="button" class="btn btn-primary btn-lg px-4 gap-3">
              Buscar
            </button>
          </div>
        </div>
      </div>
    </section>
    <!---------------Tarjetas---------------->

    <div class="container text-center">
      <div id="recipes" class="row row-cols-lg-4 g-4 align-items-center">
        <!-- Las tarjetas de recetas se insertarán aquí dinámicamente -->
         
      </div>
    </div>
    <footer class="py-3 my-4">
      <div class="nav justify-content-center border-top pb-3 mb-1">
        <p class="text-center text-body-secondary">© 2025 Gourmet Go</p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/javascript/app.js"></script>
  </body>
</html>
